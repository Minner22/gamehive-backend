spring:
    jpa:
        hibernate:
            ddl-auto: none
        show-sql: true
    flyway:
        locations: classpath:db/migration
    mail:
        # Link w mailu prowadzi na stronę frontu (Vite dev server :5173), która wyciąga token
        # z URL i sama woła API (GET /api/v1/auth/activate?token=...) przez proxy.
        activationAddress: http://localhost:5173/activate
        # Strona /password-reset/confirm pokazuje formularz nowego hasła i POST-uje na
        # POST /api/v1/auth/password-reset/confirm.
        passwordResetAddress: http://localhost:5173/password-reset/confirm
    data:
        redis:
            host: localhost
            port: 6379
            username: default
            password: ${REDIS_PASSWORD}
            timeout: 2000ms
            lettuce:
                pool:
                    max-active: 8
                    max-idle: 8
                    min-idle: 2
    docker:
        compose:
            lifecycle-management: start-and-stop
            file: docker-compose.yml