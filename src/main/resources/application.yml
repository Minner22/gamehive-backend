spring:
    profiles:
        active: dev
    application:
        name: GameHive
    datasource:
        url: jdbc:h2:mem:test;MODE=PostgreSQL

    jpa:
        hibernate:
            ddl-auto: none
        show-sql: true
    security:
        user:
            name: admin
            password: admin
    threads:
        virtual:
            enabled: true
    h2:
        console:
            enabled: true
            path: /h2-console
    sql:
        init:
            mode: always
            platform: h2
            schema-locations: classpath:db/schema.sql
            data-locations: classpath:db/data.sql
    mail:
        host: smtp.gmail.com
        port: 587
        activationAddress: http://localhost:8080/api/v1/auth/activate
        properties:
            mail:
                smtp:
                    auth: true
                    starttls:
                        enable: true
    data:
        redis:
            host: localhost
            port: 6379
            password: ${REDIS_PASSWORD:}
            timeout: 2000ms
            lettuce:
                pool:
                    max-active: 8
                    max-idle: 8
                    min-idle: 2
    config:
        import: optional:file:./secret.properties
jwt:
    activation:
        validityInSeconds: 86400
    refresh:
        validityInSeconds: 604800
        maxActiveTokensPerUser: 5
    access:
        validityInSeconds: 900

