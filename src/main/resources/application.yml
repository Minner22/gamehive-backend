spring:
    profiles:
        active: dev
    application:
        name: GameHive
    datasource:
        url: jdbc:h2:mem:test;MODE=PostgreSQL

    jpa:
        hibernate:
            ddl-auto: none
        show-sql: true
    security:
        user:
            name: admin
            password: admin
    threads:
        virtual:
            enabled: true
    h2:
        console:
            enabled: true
            path: /h2-console
    sql:
        init:
            mode: always
            platform: h2
            schema-locations: classpath:db/schema.sql
            data-locations: classpath:db/data.sql
    config:
        import: optional:file:./secret.properties